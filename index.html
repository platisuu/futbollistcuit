<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f4f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
#app { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }
.header { text-align: center; margin-bottom: 1.5rem; }

.question-text { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 3px; }
.question-meta { font-size: 12px; color: #999; }
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 0.8rem; }
.stat-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 0.65rem; text-align: center; }
.stat-label { font-size: 11px; color: #999; margin-bottom: 2px; }
.stat-value { font-size: 22px; font-weight: 600; color: #1a1a1a; }
.timer-bar-wrap { height: 5px; background: #e8e8e8; border-radius: 3px; margin-bottom: 0.8rem; overflow: hidden; }
.timer-bar { height: 100%; background: #1D9E75; border-radius: 3px; transition: width 0.5s linear, background 0.5s; }
.input-wrap { position: relative; margin-bottom: 0.8rem; }
.input-row { display: flex; gap: 8px; }
.input-row input { flex: 1; font-size: 15px; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 10px; background: #fff; color: #1a1a1a; outline: none; transition: border-color 0.15s; }

.input-row button { padding: 10px 16px; border: 1.5px solid #ddd; border-radius: 10px; background: #fff; color: #555; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
.input-row button:hover { background: #f5f5f5; border-color: #bbb; }
.dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 80px; background: #fff; border: 1px solid #ddd; border-radius: 10px; z-index: 50; overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.1); max-height: 280px; overflow-y: auto; }
.dd-item { padding: 10px 14px; font-size: 14px; cursor: pointer; color: #1a1a1a; border-bottom: 1px solid #f0f0f0; transition: background 0.1s; }
.dd-item:last-of-type { border-bottom: none; }
.dd-item:hover, .dd-item.sel { background: #f5f5f5; }
.dd-item.first { background: #e8f8f2; }
.dd-item.first:hover { background: #d4f0e6; }
.dd-item .hl { color: #1D9E75; font-weight: 600; }
.answers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin-bottom: 1rem; }
.slot { border-radius: 10px; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; text-align: center; min-height: 54px; padding: 8px 10px; border: 1.5px solid #e8e8e8; background: #fafafa; color: #bbb; }
.slot .num { font-size: 11px; display: block; font-weight: 400; margin-bottom: 2px; opacity: 0.5; }
.slot.found { background: #1D9E75; border-color: #1D9E75; color: #fff; animation: pop 0.4s ease; }
.slot.found .num { opacity: 0.75; }
.slot.missed { background: #e05a30; border-color: #e05a30; color: #fff; }
.slot.missed .num { opacity: 0.75; }
@keyframes pop { 0%{transform:scale(0.88);opacity:0.4} 60%{transform:scale(1.06)} 100%{transform:scale(1);opacity:1} }
.plus-anim { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); font-size: 18px; font-weight: 700; color: #1D9E75; pointer-events: none; opacity: 0; z-index: 100; }
.plus-anim.go { animation: floatup 1s ease forwards; }
@keyframes floatup { 0%{opacity:1;transform:translateX(-50%) translateY(0)} 100%{opacity:0;transform:translateX(-50%) translateY(-30px)} }
.flash { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); padding: 9px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 200; background: #e8f8f2; color: #0a5c3a; border: 1px solid #a8ddc5; white-space: nowrap; }
.flash.on { opacity: 1; }
.flash.err { background: #fdf0ec; color: #7a2a10; border-color: #f0b09a; }
.btn { width: 100%; padding: 11px; background: #fff; border: 1.5px solid #ddd; border-radius: 10px; color: #333; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 8px; transition: all 0.15s; }
.btn:hover { background: #f5f5f5; }
.btn.primary { background: #1D9E75; border-color: #1D9E75; color: #fff; }
.btn.primary:hover { background: #178a65; }
.result-card { text-align: center; padding: 2rem 1rem; background: #fff; border-radius: 14px; border: 1px solid #e8e8e8; }

function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'').trim();}
const DB_PLAYERS_NORM=DB_PLAYERS.map(norm);
const DB_TEAMS_NORM=DB_TEAMS.map(norm);
function allVariants(ans){const v=[norm(ans.display),...ans.aliases.map(norm)];const p=norm(ans.display).split(' ');if(p.length>1){v.push(p[0]);v.push(p[p.length-1]);}return[...new Set(v)];}
function isListMatch(input,ans){return allVariants(ans).some(v=>v===norm(input));}
function searchDB(input){if(!input||input.length<2)return[];const n=norm(input);const db=list.type==='player'?DB_PLAYERS:DB_TEAMS;const dbN=list.type==='player'?DB_PLAYERS_NORM:DB_TEAMS_NORM;const s=[],c=[];db.forEach((name,i)=>{if(dbN[i].startsWith(n))s.push(name);else if(dbN[i].includes(n))c.push(name);});return[...s,...c].slice(0,8);}
function hl(text,query){const nt=norm(text),n=norm(query);const pos=nt.indexOf(n);if(pos<0)return text;return text.slice(0,pos)+'<span class="hl">'+text.slice(pos,pos+query.length)+'</span>'+text.slice(pos+query.length);}
function renderDD(val){const dd=document.getElementById('dd');if(!val||val.length<2){dd.classList.add('hidden');ddItems=[];ddIdx=-1;return;}const res=searchDB(val);if(!res.length){dd.classList.add('hidden');ddItems=[];ddIdx=-1;return;}ddItems=res.map(n=>({name:n}));dd.innerHTML='';res.forEach((name,si)=>{const div=document.createElement('div');div.className='dd-item'+(si===0?' first':'');div.innerHTML=hl(name,val);div.addEventListener('mousedown',e=>{e.preventDefault();pickItem(si);});dd.appendChild(div);});ddIdx=-1;dd.classList.remove('hidden');}
function updateSel(){const items=document.querySelectorAll('.dd-item');items.forEach((el,i)=>{el.classList.remove('first','sel');if(ddIdx===-1){if(i===0)el.classList.add('first');}else{if(i===ddIdx)el.classList.add('sel');}});}
function hideDD(){document.getElementById('dd').classList.add('hidden');ddItems=[];ddIdx=-1;}
function pickItem(si){const item=ddItems[si];if(!item)return;doSubmit(item.name);}
function doSubmit(val){if(!active)return;const v=(val!==undefined?val:document.getElementById('inp').value).trim();if(!v)return;let hit=-1;list.answers.forEach((ans,i)=>{if(!found[i]&&isListMatch(v,ans))hit=i;});if(hit>=0){found[hit]=true;timeLeft+=BONUS;maxTime=Math.max(maxTime,timeLeft);const slot=document.getElementById('slot'+hit);slot.className='slot found';slot.innerHTML='<div><span class="num">'+(hit+1)+'</span>'+list.answers[hit].display+'</div>';document.getElementById('s-found').textContent=found.filter(Boolean).length;updateTimer();updateBar();animPlus();if(found.every(Boolean))endGame();}else{flash('"'+v+'" no és a la llista',true);}document.getElementById('inp').value='';hideDD();document.getElementById('inp').focus();}
function initGame(){list=LISTS[idx%LISTS.length];found=new Array(list.answers.length).fill(false);timeLeft=BASE_TIME;maxTime=BASE_TIME;active=true;document.getElementById('q-text').textContent=list.q;document.getElementById('q-meta').textContent=list.meta;document.getElementById('s-total').textContent=list.answers.length;document.getElementById('s-found').textContent=0;document.getElementById('inp').value='';document.getElementById('inp').placeholder=list.type==='player'?'Escriu un jugador...':'Escriu un equip o selecció...';hideDD();document.getElementById('screen-game').classList.remove('hidden');document.getElementById('screen-result').classList.add('hidden');renderGrid();updateTimer();updateBar();clearInterval(tmr);tmr=setInterval(tick,1000);document.getElementById('inp').focus();}
function renderGrid(){const g=document.getElementById('grid');g.innerHTML='';list.answers.forEach((ans,i)=>{const d=document.createElement('div');d.className='slot'+(found[i]?' found':'');d.id='slot'+i;d.innerHTML=found[i]?'<div><span class="num">'+(i+1)+'</span>'+ans.display+'</div>':'<div><span class="num">'+(i+1)+'</span>?</div>';g.appendChild(d);});}
function tick(){if(!active)return;timeLeft=Math.max(0,timeLeft-1);updateTimer();updateBar();if(timeLeft<=0)endGame();}
function updateTimer(){const m=Math.floor(timeLeft/60),s=timeLeft%60;document.getElementById('s-time').textContent=m+':'+String(s).padStart(2,'0');}
function updateBar(){const pct=Math.max(0,timeLeft/maxTime*100);const b=document.getElementById('tbar');b.style.width=pct+'%';b.style.background=pct>50?'#1D9E75':pct>25?'#f0a500':'#e05a30';}
function animPlus(){const el=document.getElementById('plus');el.className='plus-anim';void el.offsetWidth;el.className='plus-anim go';}
function flash(msg,err){const el=document.getElementById('flash');el.textContent=msg;el.className='flash on'+(err?' err':'');clearTimeout(el._t);el._t=setTimeout(()=>el.className='flash',1600);}
function endGame(){active=false;clearInterval(tmr);hideDD();list.answers.forEach((ans,i)=>{if(!found[i]){const s=document.getElementById('slot'+i);s.className='slot missed';s.innerHTML='<div><span class="num">'+(i+1)+'</span>'+ans.display+'</div>';}});setTimeout(showResult,700);}
function showResult(){const total=list.answers.length,got=found.filter(Boolean).length,pct=got/total;const emojis=['😅','😅','👊','⚽','⚽','🏆'];const titles=['Cal estudiar més','Cal estudiar més','Passable','Bé!','Molt bé!','Llista perfecta!'];const ei=Math.min(5,Math.floor(pct*6));const squares=found.map(f=>f?'🟩':'🟥').join('');const d=new Date();const share='⚽ Lista Futbolera '+d.toLocaleDateString('ca-ES')+'\n'+got+'/'+total+'\n'+squares;document.getElementById('r-emoji').textContent=emojis[ei];document.getElementById('r-title').textContent=titles[ei];document.getElementById('r-sub').textContent=got+' de '+total+' respostes · +'+got*BONUS+'s de bonus';document.getElementById('r-share').textContent=share;document.getElementById('screen-game').classList.add('hidden');document.getElementById('screen-result').classList.remove('hidden');}
function copyShare(){navigator.clipboard.writeText(document.getElementById('r-share').textContent).then(()=>flash('Copiat!',false));}
function nextQ(){idx++;initGame();}
const inp=document.getElementById('inp');
inp.addEventListener('input',e=>renderDD(e.target.value));
inp.addEventListener('keydown',e=>{if(e.key==='ArrowDown'){e.preventDefault();if(ddItems.length){ddIdx=Math.min(ddIdx+1,ddItems.length-1);updateSel();}}else if(e.key==='ArrowUp'){e.preventDefault();if(ddItems.length){ddIdx=Math.max(ddIdx-1,-1);updateSel();}}else if(e.key==='Enter'){e.preventDefault();if(ddItems.length>0&&ddIdx===-1)pickItem(0);else if(ddItems.length>0&&ddIdx>=0)pickItem(ddIdx);else doSubmit(inp.value.trim());}else if(e.key==='Escape')hideDD();});
document.addEventListener('click',e=>{if(!e.target.closest('.input-wrap'))hideDD();});
const days=['Diumenge','Dilluns','Dimarts','Dimecres','Dijous','Divendres','Dissabte'];
const months=['gener','febrer','març','abril','maig','juny','juliol','agost','setembre','octubre','novembre','desembre'];
const now=new Date();
document.getElementById('date-label').textContent=days[now.getDay()]+', '+now.getDate()+' de '+months[now.getMonth()]+' · Llista #'+((Math.floor(Date.now()/86400000)%LISTS.length)+1);
initGame();
</script>
</body>
</html>
