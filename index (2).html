<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futbol List-a</title>
<style>
:root{--bg:#1a1a2e;--bg2:#16213e;--card:#1e2a45;--card2:#243352;--green:#4ecca3;--green2:#3db891;--red:#e94560;--text:#eaeaea;--text2:#a0aec0;--border:rgba(255,255,255,0.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);min-height:100vh;}
.top-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0.75rem 1rem;display:flex;align-items:center;justify-content:center;position:relative;}
.top-bar h1{font-size:20px;font-weight:700;letter-spacing:1px;color:var(--green);text-transform:uppercase;}
.day-badge{position:absolute;right:1rem;font-size:12px;color:var(--text2);background:var(--card);padding:4px 10px;border-radius:20px;border:1px solid var(--border);}
.admin-btn{position:absolute;left:1rem;font-size:12px;color:var(--text2);background:var(--card);padding:4px 10px;border-radius:20px;border:1px solid var(--border);cursor:pointer;text-decoration:none;}
.admin-btn:hover{color:var(--green);border-color:var(--green);}
#app{max-width:640px;margin:0 auto;padding:1.25rem 1rem;}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:1.25rem;border-left:4px solid var(--green);}
.question-text{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.4;}
.question-meta{font-size:12px;color:var(--text2);}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0.8rem;text-align:center;}
.stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.stat-value{font-size:24px;font-weight:800;color:var(--green);}
.stat-value.timer{color:var(--text);}
.stat-value.timer.warning{color:#f6ad55;}
.stat-value.timer.danger{color:var(--red);}
.timer-bar-wrap{height:6px;background:var(--card2);border-radius:3px;margin-bottom:1rem;overflow:hidden;}
.timer-bar{height:100%;background:var(--green);border-radius:3px;transition:width 0.5s linear,background 0.5s;}
.input-wrap{position:relative;margin-bottom:1rem;}
.input-row{display:flex;gap:8px;}
.input-row input{flex:1;font-size:15px;padding:11px 16px;border:1.5px solid var(--border);border-radius:12px;background:var(--card);color:var(--text);outline:none;transition:border-color 0.15s;}
.input-row input::placeholder{color:var(--text2);}
.input-row input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(78,204,163,0.15);}
.input-row button{padding:11px 16px;border:1.5px solid var(--border);border-radius:12px;background:var(--card);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all 0.15s;white-space:nowrap;}
.input-row button:hover{background:var(--card2);color:var(--text);}
.dropdown{position:absolute;top:calc(100% + 5px);left:0;right:80px;background:var(--card2);border:1px solid var(--border);border-radius:12px;z-index:50;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.4);max-height:280px;overflow-y:auto;}
.dd-item{padding:10px 16px;font-size:14px;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border);transition:background 0.1s;}
.dd-item:last-of-type{border-bottom:none;}
.dd-item:hover{background:rgba(255,255,255,0.05);}
.dd-item.first{background:rgba(78,204,163,0.12);}
.dd-item.first:hover{background:rgba(78,204,163,0.2);}
.dd-item.sel{background:rgba(255,255,255,0.08);}
.dd-item .hl{color:var(--green);font-weight:700;}
.answers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px;margin-bottom:1rem;}
.slot{border-radius:12px;font-size:13px;font-weight:600;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:58px;padding:10px 8px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);}
.slot .num{font-size:10px;font-weight:500;margin-bottom:3px;opacity:0.5;}
.slot.found{background:rgba(78,204,163,0.15);border-color:var(--green);color:var(--green);animation:pop 0.4s ease;}
.slot.found .num{opacity:0.6;color:var(--green);}
.slot.missed{background:rgba(233,69,96,0.15);border-color:var(--red);color:var(--red);}
.slot.missed .num{opacity:0.6;color:var(--red);}
@keyframes pop{0%{transform:scale(0.85);opacity:0.3}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.plus-anim{position:fixed;top:70px;left:50%;transform:translateX(-50%);font-size:20px;font-weight:800;color:var(--green);pointer-events:none;opacity:0;z-index:100;}
.plus-anim.go{animation:floatup 1s ease forwards;}
@keyframes floatup{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-32px)}}
.flash{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:25px;font-size:14px;font-weight:600;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:200;white-space:nowrap;}
.flash.on{opacity:1;}
.flash.ok{background:rgba(78,204,163,0.2);color:var(--green);border:1px solid var(--green);}
.flash.err{background:rgba(233,69,96,0.2);color:var(--red);border:1px solid var(--red);}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem 1.5rem;text-align:center;margin-top:1rem;}
.result-emoji{font-size:56px;margin-bottom:1rem;}
.result-title{font-size:26px;font-weight:800;margin-bottom:6px;}
.result-score{font-size:48px;font-weight:900;color:var(--green);margin-bottom:4px;}
.result-sub{font-size:14px;color:var(--text2);margin-bottom:1.5rem;}
.share-box{background:var(--bg);border-radius:12px;padding:1rem 1.25rem;font-family:'Courier New',monospace;font-size:13px;white-space:pre-wrap;text-align:left;margin-bottom:1.25rem;color:var(--text2);border:1px solid var(--border);}
.btn{width:100%;padding:13px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;border:none;transition:all 0.15s;}
.btn.primary{background:var(--green);color:#0f1a2e;}
.btn.primary:hover{background:var(--green2);}
.btn.secondary{background:var(--card2);color:var(--text);border:1px solid var(--border);}
.btn.secondary:hover{background:rgba(255,255,255,0.08);}

/* ADMIN */
#screen-admin{display:none;}
#screen-admin.active{display:block;}
.admin-header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;}
.admin-header h2{font-size:20px;font-weight:700;color:var(--green);}
.back-btn{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;}
.back-btn:hover{color:var(--text);}
.schedule-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem;}
.schedule-day{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;}
.schedule-day .day-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;}
.schedule-day select{width:100%;background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;outline:none;cursor:pointer;}
.schedule-day select:focus{border-color:var(--green);}
.schedule-day .current-badge{display:inline-block;font-size:10px;background:rgba(78,204,163,0.2);color:var(--green);border:1px solid var(--green);padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle;}
.save-btn{width:100%;padding:13px;background:var(--green);color:#0f1a2e;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;}
.save-btn:hover{background:var(--green2);}
.admin-info{font-size:12px;color:var(--text2);text-align:center;margin-top:0.75rem;}

.hidden{display:none!important;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div class="top-bar">
  <a class="admin-btn" onclick="openAdmin()">⚙ Programar</a>
  <h1>⚽ Futbol List-a</h1>
  <span class="day-badge" id="date-label"></span>
</div>

<div id="app">
  <!-- JOC -->
  <div id="screen-game">
    <div class="question-card">
      <div class="question-text" id="q-text"></div>
      <div class="question-meta" id="q-meta"></div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Encertades</div><div class="stat-value" id="s-found">0</div></div>
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="s-total">0</div></div>
      <div class="stat-card"><div class="stat-label">Temps</div><div class="stat-value timer" id="s-time">1:40</div></div>
    </div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="tbar"></div></div>
    <div class="input-wrap">
      <div class="input-row">
        <input type="text" id="inp" placeholder="Escriu aquí..." autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button onclick="endGame()">Acabar</button>
      </div>
      <div class="dropdown hidden" id="dd"></div>
    </div>
    <div class="answers-grid" id="grid"></div>
  </div>

  <!-- RESULTAT -->
  <div id="screen-result" class="hidden">
    <div class="result-card">
      <div class="result-emoji" id="r-emoji"></div>
      <div class="result-title" id="r-title"></div>
      <div class="result-score" id="r-score"></div>
      <div class="result-sub" id="r-sub"></div>
      <div class="share-box" id="r-share"></div>
      <button class="btn primary" onclick="copyShare()">📋 Copiar resultat</button>
      <button class="btn secondary" onclick="nextQ()">Següent llista →</button>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="screen-admin">
    <div class="admin-header">
      <button class="back-btn" onclick="closeAdmin()">← Tornar</button>
      <h2>⚙ Programar llistes</h2>
    </div>
    <div class="schedule-grid" id="schedule-grid"></div>
    <button class="save-btn" onclick="saveSchedule()">💾 Guardar programació</button>
    <p class="admin-info">Els canvis es guarden al navegador. Tots els jugadors que accedeixin veuran la llista del seu dia.</p>
  </div>
</div>

<div class="flash" id="flash"></div>
<div class="plus-anim" id="plus">+5s</div>

// ===================== PROGRAMACIÓ DIÀRIA =====================
const BASE_DATE = new Date('2026-04-06').getTime();
const MS_DAY = 86400000;

function getTodayIndex() {
  const saved = localStorage.getItem('schedule');
  if (saved) {
    const schedule = JSON.parse(saved);
    const todayKey = getTodayKey();
    if (schedule[todayKey] !== undefined) return schedule[todayKey];
  }
  const dayNum = Math.floor((Date.now() - BASE_DATE) / MS_DAY);
  return ((dayNum % ALL_LISTS.length) + ALL_LISTS.length) % ALL_LISTS.length;
}

function getTodayKey() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function getDateKey(offset) {
  const d = new Date(Date.now() + offset * MS_DAY);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function getDateLabel(offset) {
  const d = new Date(Date.now() + offset * MS_DAY);
  const days = ['Diumenge','Dilluns','Dimarts','Dimecres','Dijous','Divendres','Dissabte'];
  const months = ['gen','feb','mar','abr','mai','jun','jul','ago','set','oct','nov','des'];
  return days[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()];
}

// ===================== JOC =====================
const BASE_TIME=100,BONUS=5;
let list,found,tmr,timeLeft,maxTime,active,ddItems=[],ddIdx=-1;
let currentListIdx = getTodayIndex();

function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'').trim();}
const DBP_N=DB_PLAYERS.map(norm),DBT_N=DB_TEAMS.map(norm);
function allVariants(ans){const v=[norm(ans.display),...ans.aliases.map(norm)];const p=norm(ans.display).split(' ');if(p.length>1){v.push(p[0]);v.push(p[p.length-1]);}return[...new Set(v)];}
function isListMatch(input,ans){return allVariants(ans).some(v=>v===norm(input));}
function searchDB(input){if(!input||input.length<2)return[];const n=norm(input);const db=list.type==='player'?DB_PLAYERS:DB_TEAMS;const dbN=list.type==='player'?DBP_N:DBT_N;const s=[],c=[];db.forEach((name,i)=>{if(dbN[i].startsWith(n))s.push(name);else if(dbN[i].includes(n))c.push(name);});return[...s,...c].slice(0,8);}
function hl(text,query){const nt=norm(text),n=norm(query);const pos=nt.indexOf(n);if(pos<0)return text;return text.slice(0,pos)+'<span class="hl">'+text.slice(pos,pos+query.length)+'</span>'+text.slice(pos+query.length);}

function renderDD(val){const dd=document.getElementById('dd');if(!val||val.length<2){dd.classList.add('hidden');ddItems=[];ddIdx=-1;return;}const res=searchDB(val);if(!res.length){dd.classList.add('hidden');ddItems=[];ddIdx=-1;return;}ddItems=res.map(n=>({name:n}));dd.innerHTML='';res.forEach((name,si)=>{const div=document.createElement('div');div.className='dd-item'+(si===0?' first':'');div.innerHTML=hl(name,val);div.addEventListener('mousedown',e=>{e.preventDefault();pickItem(si);});dd.appendChild(div);});ddIdx=-1;dd.classList.remove('hidden');}
function updateSel(){const items=document.querySelectorAll('.dd-item');items.forEach((el,i)=>{el.classList.remove('first','sel');if(ddIdx===-1){if(i===0)el.classList.add('first');}else{if(i===ddIdx)el.classList.add('sel');}});}
function hideDD(){document.getElementById('dd').classList.add('hidden');ddItems=[];ddIdx=-1;}
function pickItem(si){const item=ddItems[si];if(!item)return;doSubmit(item.name);}

function doSubmit(val){if(!active)return;const v=(val!==undefined?val:document.getElementById('inp').value).trim();if(!v)return;let hit=-1;list.answers.forEach((ans,i)=>{if(!found[i]&&isListMatch(v,ans))hit=i;});if(hit>=0){found[hit]=true;timeLeft+=BONUS;maxTime=Math.max(maxTime,timeLeft);const slot=document.getElementById('slot'+hit);slot.className='slot found';slot.innerHTML='<span class="num">'+(hit+1)+'</span><span class="name">'+list.answers[hit].display+'</span>';document.getElementById('s-found').textContent=found.filter(Boolean).length;updateTimer();updateBar();animPlus();if(found.every(Boolean))endGame();}else{flash('"'+v+'" no és a la llista',true);}document.getElementById('inp').value='';hideDD();document.getElementById('inp').focus();}

function initGame(){
  list=ALL_LISTS[currentListIdx];
  found=new Array(list.answers.length).fill(false);
  timeLeft=BASE_TIME;maxTime=BASE_TIME;active=true;
  document.getElementById('q-text').textContent=list.q;
  document.getElementById('q-meta').textContent=list.meta;
  document.getElementById('s-total').textContent=list.answers.length;
  document.getElementById('s-found').textContent=0;
  document.getElementById('inp').value='';
  document.getElementById('inp').placeholder=list.type==='player'?'Escriu un jugador...':'Escriu un equip o selecció...';
  hideDD();
  document.getElementById('screen-game').classList.remove('hidden');
  document.getElementById('screen-result').classList.add('hidden');
  renderGrid();updateTimer();updateBar();
  clearInterval(tmr);tmr=setInterval(tick,1000);
  document.getElementById('inp').focus();
}

function renderGrid(){const g=document.getElementById('grid');g.innerHTML='';list.answers.forEach((ans,i)=>{const d=document.createElement('div');d.className='slot'+(found[i]?' found':'');d.id='slot'+i;d.innerHTML='<span class="num">'+(i+1)+'</span><span class="name">'+(found[i]?ans.display:'?')+'</span>';g.appendChild(d);});}
function tick(){if(!active)return;timeLeft=Math.max(0,timeLeft-1);updateTimer();updateBar();if(timeLeft<=0)endGame();}
function updateTimer(){const m=Math.floor(timeLeft/60),s=timeLeft%60;const el=document.getElementById('s-time');el.textContent=m+':'+String(s).padStart(2,'0');el.className='stat-value timer'+(timeLeft<=30?' danger':timeLeft<=60?' warning':'');}
function updateBar(){const pct=Math.max(0,timeLeft/maxTime*100);const b=document.getElementById('tbar');b.style.width=pct+'%';b.style.background=pct>50?'#4ecca3':pct>25?'#f6ad55':'#e94560';}
function animPlus(){const el=document.getElementById('plus');el.className='plus-anim';void el.offsetWidth;el.className='plus-anim go';}
function flash(msg,err){const el=document.getElementById('flash');el.textContent=msg;el.className='flash on'+(err?' err':' ok');clearTimeout(el._t);el._t=setTimeout(()=>el.className='flash',1600);}

function endGame(){active=false;clearInterval(tmr);hideDD();list.answers.forEach((ans,i)=>{if(!found[i]){const s=document.getElementById('slot'+i);s.className='slot missed';s.innerHTML='<span class="num">'+(i+1)+'</span><span class="name">'+ans.display+'</span>';}});setTimeout(showResult,800);}

function showResult(){
  const total=list.answers.length,got=found.filter(Boolean).length,pct=got/total;
  const emojis=['😅','😅','👊','⚽','⚽','🏆'];
  const titles=['Cal estudiar més','Cal estudiar més','Passable','Bé!','Molt bé!','Llista perfecta!'];
  const ei=Math.min(5,Math.floor(pct*6));
  const squares=found.map(f=>f?'🟩':'🟥').join('');
  const d=new Date();
  const share='⚽ Futbol List-a · '+d.toLocaleDateString('ca-ES')+'\n'+list.q+'\n'+got+'/'+total+' '+squares;
  document.getElementById('r-emoji').textContent=emojis[ei];
  document.getElementById('r-title').textContent=titles[ei];
  document.getElementById('r-score').textContent=got+'/'+total;
  document.getElementById('r-sub').textContent='+'+got*BONUS+'s de bonus acumulats';
  document.getElementById('r-share').textContent=share;
  document.getElementById('screen-game').classList.add('hidden');
  document.getElementById('screen-result').classList.remove('hidden');
}
function copyShare(){navigator.clipboard.writeText(document.getElementById('r-share').textContent).then(()=>flash('Copiat!',false));}
function nextQ(){currentListIdx=(currentListIdx+1)%ALL_LISTS.length;initGame();}

// ===================== ADMIN =====================
function openAdmin(){
  clearInterval(tmr);
  document.getElementById('screen-game').classList.add('hidden');
  document.getElementById('screen-result').classList.add('hidden');
  document.getElementById('screen-admin').classList.add('active');
  renderSchedule();
}
function closeAdmin(){
  document.getElementById('screen-admin').classList.remove('active');
  document.getElementById('screen-game').classList.remove('hidden');
  initGame();
}

function renderSchedule(){
  const saved = JSON.parse(localStorage.getItem('schedule')||'{}');
  const grid = document.getElementById('schedule-grid');
  grid.innerHTML='';
  const todayKey = getTodayKey();

  for(let i=0;i<10;i++){
    const key = getDateKey(i);
    const label = getDateLabel(i);
    const isToday = key===todayKey;
    const currentVal = saved[key]!==undefined ? saved[key] : ((getTodayIndex()+i)%ALL_LISTS.length);

    const div = document.createElement('div');
    div.className='schedule-day';

    let options='';
    ALL_LISTS.forEach((l,idx)=>{
      options+=`<option value="${idx}"${idx===currentVal?' selected':''}>${idx+1}. ${l.q}</option>`;
    });

    div.innerHTML=`
      <div class="day-title">
        ${label}${isToday?'<span class="current-badge">avui</span>':''}
      </div>
      <select id="sel-${key}">${options}</select>
    `;
    grid.appendChild(div);
  }
}

function saveSchedule(){
  const saved={};
  for(let i=0;i<10;i++){
    const key=getDateKey(i);
    const sel=document.getElementById('sel-'+key);
    if(sel) saved[key]=parseInt(sel.value);
  }
  localStorage.setItem('schedule',JSON.stringify(saved));
  flash('Programació guardada!',false);
  setTimeout(closeAdmin,1200);
}

// ===================== INIT =====================
const inp=document.getElementById('inp');
inp.addEventListener('input',e=>renderDD(e.target.value));
inp.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'){e.preventDefault();if(ddItems.length){ddIdx=Math.min(ddIdx+1,ddItems.length-1);updateSel();}}
  else if(e.key==='ArrowUp'){e.preventDefault();if(ddItems.length){ddIdx=Math.max(ddIdx-1,-1);updateSel();}}
  else if(e.key==='Enter'){e.preventDefault();if(ddItems.length>0&&ddIdx===-1)pickItem(0);else if(ddItems.length>0&&ddIdx>=0)pickItem(ddIdx);else doSubmit(inp.value.trim());}
  else if(e.key==='Escape')hideDD();
});
document.addEventListener('click',e=>{if(!e.target.closest('.input-wrap'))hideDD();});

const days=['Diumenge','Dilluns','Dimarts','Dimecres','Dijous','Divendres','Dissabte'];
const months=['gener','febrer','març','abril','maig','juny','juliol','agost','setembre','octubre','novembre','desembre'];
const now=new Date();
document.getElementById('date-label').textContent=days[now.getDay()]+' '+now.getDate()+' de '+months[now.getMonth()];
initGame();
</script>
